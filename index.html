<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Інтернет-магазин побутової техніки</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="logo">TechStore</div>
        
        <nav class="nav">
            <ul class="nav-list">
                <li><a href="#">Головна</a></li>
                <li><a href="#">Холодильники</a></li>
                <li><a href="#">Пральні машини</a></li>
                <li><a href="#">Контакти</a></li>
            </ul>
        </nav>

        <div class="burger-menu" id="burger-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <main class="main-content">
        <section class="products">
            <h1 class="section-title">Популярні товари</h1>
            
            <div class="product-grid">
                
                <article class="card">
                    <div class="card-img">Холодильник</div>
                    <h2 class="card-title">Bosch KGN39</h2>
                    <p class="card-price">24 500 грн</p>
                    <button class="btn">В кошик</button>
                </article>

                <article class="card">
                    <div class="card-img">Пральна машина</div>
                    <h2 class="card-title">LG F4V5</h2>
                    <p class="card-price">18 999 грн</p>
                    <button class="btn">В кошик</button>
                </article>

                <article class="card">
                    <div class="card-img">Мікрохвильовка</div>
                    <h2 class="card-title">Samsung ME88</h2>
                    <p class="card-price">4 200 грн</p>
                    <button class="btn">В кошик</button>
                </article>

                <article class="card">
                    <div class="card-img">Кавомашина</div>
                    <h2 class="card-title">DeLonghi Magnifica</h2>
                    <p class="card-price">15 400 грн</p>
                    <button class="btn">В кошик</button>
                </article>

            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2026 TechStore. Всі права захищено.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
